<!DOCTYPE html>
<html>
<head>
  <title>Survey Form</title>
</head>
<body>

<h1 id="title">Survey Form</h1>
<p id="description">Thank you for taking the time to help us improve.</p>

<form id="survey-form">

<label id="name-label" for="name">Name</label>
<input 
  id="name"
  type="text"
  placeholder="Enter your name"
  required
>

<label id="email-label" for="email">Email</label>
<input 
  id="email"
  type="email"
  placeholder="Enter your email"
  required
>

<label id="number-label" for="number">Age</label>
<input
  id="number"
  type="number"
  min="10"
  max="100"
  placeholder="Enter your age"
>

<p>Choose an option</p>
<select id="dropdown">
  <option>Student</option>
  <option>Full Time Job</option>
</select>

<p>Would you recommend this course?</p>

<label>
<input type="radio" name="recommend" value="yes"> Yes
</label>

<label>
<input type="radio" name="recommend" value="no"> No
</label>

<p>What would you like to see improved?</p>

<label><input type="checkbox" value="frontend"> Front-end Projects</label>
<label><input type="checkbox" value="backend"> Back-end Projects</label>

<p>Any comments or suggestions?</p>

<textarea placeholder="Enter your comment here..."></textarea>

<button id="submit" type="submit">Submit</button>

</form>

</body>
</html>
